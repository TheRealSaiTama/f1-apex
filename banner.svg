<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background:#0a0a0a; font-family:'Segoe UI',Roboto,sans-serif;">
  <style>
    @keyframes speed-line {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateX(100%); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
    @keyframes car-drift {
      0% { transform: translate(-150px, 120px) scale(0.85); }
      45% { transform: translate(320px, 118px) scale(1.05); }
      100% { transform: translate(850px, 115px) scale(0.85); }
    }
    @keyframes red-glow {
      0%, 100% { filter: drop-shadow(0 0 2px #e10600); }
      50% { filter: drop-shadow(0 0 8px #e10600); }
    }
    @keyframes reveal-text {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .grid-line { stroke: #1a1a1a; stroke-width: 1; }
    .speed-trail {
      stroke: url(#red-gradient);
      stroke-width: 3;
      stroke-linecap: round;
      animation: speed-line 2.2s infinite linear;
    }
    .car {
      animation: car-drift 3.5s infinite cubic-bezier(0.25, 1, 0.5, 1);
    }
    .text-title {
      font-weight: 900;
      font-size: 42px;
      fill: #fff;
      letter-spacing: 0.05em;
      animation: reveal-text 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    .text-red { fill: #e10600; animation: red-glow 2s infinite ease-in-out; }
    .text-sub {
      font-size: 11px;
      fill: #888884;
      letter-spacing: 0.35em;
      font-weight: 700;
      animation: reveal-text 1.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>

  <defs>
    <linearGradient id="red-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e10600" stop-opacity="0" />
      <stop offset="50%" stop-color="#e10600" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#e10600" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background grid pattern -->
  <g style="animation: pulse 4s infinite ease-in-out;">
    <line x1="0" y1="40" x2="800" y2="40" class="grid-line" />
    <line x1="0" y1="80" x2="800" y2="80" class="grid-line" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid-line" />
    <line x1="0" y1="160" x2="800" y2="160" class="grid-line" />
    
    <line x1="100" y1="0" x2="100" y2="200" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="200" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="200" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="200" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="200" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="200" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="200" class="grid-line" />
  </g>

  <!-- Neon speed trails -->
  <line x1="-800" y1="135" x2="0" y2="135" class="speed-trail" style="animation-delay: 0s;" />
  <line x1="-800" y1="110" x2="0" y2="110" class="speed-trail" style="animation-delay: 1.1s;" />
  <line x1="-800" y1="145" x2="0" y2="145" class="speed-trail" style="animation-delay: 0.5s;" />

  <!-- Animated F1 Car Outline -->
  <g class="car">
    <path d="M0 10 L15 10 L25 5 L55 5 L65 12 L90 12 L100 8 L105 12 L120 12 L115 18 L60 18 L50 20 L20 20 L10 16 Z" fill="#e10600" style="animation: red-glow 1.5s infinite ease-in-out; opacity: 0.95;" />
    <!-- Wheels -->
    <ellipse cx="25" cy="18" rx="9" ry="6" fill="#111" stroke="#333" stroke-width="1.5" />
    <ellipse cx="95" cy="18" rx="9" ry="6" fill="#111" stroke="#333" stroke-width="1.5" />
    <!-- Rear Wing -->
    <rect x="0" y="2" width="10" height="8" fill="#fff" opacity="0.8" />
  </g>

  <!-- Title Text -->
  <text x="60" y="85" class="text-title">F1<tspan class="text-red"> APEX</tspan></text>
  <text x="64" y="108" class="text-sub">HIGH-OCTANE FORMULA 1 INTERACTIVE DASHBOARD</text>
</svg>
